name: test-action
on:
  issues:
    types: [assigned]
jobs:
  test-job:
    runs-on: ubuntu-latest
    steps:
      - name: checkout-repo
        uses: actions/checkout@v2
      - name: issue-title
        run: | 
          echo ${{github.issue.title}}
          echo ${{hashFiles(github.issue.title)}}
      - name: check-file-exists
        if: hashFiles(github.issue.title) != ''
        run: echo "file found"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  
